name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela execuções antigas do mesmo branch/PR quando há novo push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # O projeto tem um conflito de peer-deps pré-existente (zod 4 vs
      # @tanstack/zod-adapter que pede zod 3). O Lovable instala com esta flag;
      # mantemos o mesmo comportamento para reproduzir o lockfile fielmente.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
